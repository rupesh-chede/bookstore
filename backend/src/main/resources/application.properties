# ============================
# AWS RDS MySQL Configuration
# ============================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:books}?useSSL=true&requireSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# JWT Secret (use strong secret in production)
jwt.secret=${JWT_SECRET:bookstore-secret-key-change-in-production-must-be-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload (images stored on server or S3)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# CORS - allow frontend URL
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Upload directory
app.upload.dir=${UPLOAD_DIR:./uploads}

# Logging
logging.level.com.bookstore=INFO
logging.level.org.springframework.security=WARN
